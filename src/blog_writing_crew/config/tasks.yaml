writing_task:
  description: >
    Use the news_search tool to research "{topic}" for the year {current_year}.
    Search Google, find at least 5 relevant articles, and scrape their full content.
    Then write a compelling blog post about "{topic}" based on the research.
    The post should:
    - Open with a hook that grabs attention
    - Include real facts, statistics, and data from the sources
    - Be well-structured with clear sections
    - Be at least 6 paragraphs long
    - End with a conclusion
    - Use markdown formatting
  expected_output: >
    A complete blog post formatted in markdown with at least 6 paragraphs,
    real data from sources, and clear section breaks.
  agent: writer

humanising_task:
  description: >
    Rewrite the blog post to sound completely natural and human.
    Remove all AI tone, corporate jargon, and formal language.
    Make it sound like a knowledgeable friend explaining the topic
    in a warm, conversational way. Use simple words, natural sentence
    flow, and a friendly tone. Keep all the facts and data intact —
    just change HOW it sounds. Think: warm, clear, human.
  expected_output: >
    The same blog post rewritten in a natural, conversational, human tone.
    All key facts and data preserved. No AI-sounding phrasing.
  agent: humaniser

editing_task:
  description: >
    Review the humanised blog post for:
    - Grammar, spelling, and punctuation
    - Markdown formatting issues
    - Clarity and readability
    - Consistent tone (preserve the natural human voice)
    Make any necessary fixes and return the final polished version.
  expected_output: >
    A polished, publication-ready blog post in markdown format,
    clean and professional while keeping the natural human tone.
  agent: editor
  output_file: output/blog_post.md