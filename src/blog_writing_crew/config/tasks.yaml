writing_task:
  description: >
    Write a 2500+ word blog post about "{topic}".
    1. Plan first then write. Research: news_search (5 sources), wikipedia_search,
       hackernews_search, arxiv_search
    2. Every claim needs a real source URL. Never fabricate.
    3. Structure: 2 headline options, Intro (~250 words), 8 sections (~300 words each),
       Conclusion (~150 words), ## References
    4. Formatting: Emoji headers, bold stats, blockquotes, 10-15 inline [text](url) links,
       1 mermaid diagram (```mermaid graph LR```), --- between sections
    5. Verify: count words (>=2500) and links (>=10) before finishing
  expected_output: >
    2500+ word article with sources, formatting, and mermaid diagram.
  agent: writer

humanising_task:
  description: >
    Rewrite to natural conversational tone. Like a friend explaining the topic.
    1. KEEP: all facts, data, source links, markdown formatting
    2. REMOVE: AI tone, jargon, fabricated content. Silently drop unsourced claims
  expected_output: >
    Same post, conversational tone. All facts/links preserved.
  agent: humaniser

editing_task:
  description: >
    Polish grammar, flow, and run final quality check. Output ONLY the complete article.
    1. Fix grammar, spelling, flow. Fact-check every claim — remove unsupported statements
    2. Verify: 2500+ words (expand if short), 10+ real inline links, emoji headers,
       mermaid diagram, blockquotes, bold stats, references section
    3. Fix any missing elements silently
    OUTPUT ONLY the complete corrected article. No commentary, no status.
  expected_output: >
    Clean, fact-checked, publication-ready article.
  agent: editor

seo_task:
  description: >
    Add SEO metadata. Prepend YAML frontmatter.
    1. Extract 5-8 tags. Optimize title (<60 chars). Verify heading hierarchy
    2. Prepend: ---\ntitle: "<title>"\ntags: [tag1, tag2, tag3]\n---
    3. Output the complete article with frontmatter — no extra commentary
  expected_output: >
    Article with YAML frontmatter, optimized title and tags.
  agent: seo_optimizer
