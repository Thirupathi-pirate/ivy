research_task:
  description: >
    Conduct a thorough research about {topic}
    Make sure you find any interesting and relevant information given
    the current year is {current_year}.
  expected_output: >
    A list with 10 bullet points of the most relevant information about {topic}
  agent: researcher

writing_task:
  description: >
    Write an engaging blog post about {topic} based on the research findings.
    The post should be well-structured, informative, and easy to read.
  expected_output: >
    A fully fledged blog post of at least 4 paragraphs formatted in markdown.
  agent: writer

editing_task:
  description: >
    Review and polish the blog post for clarity, grammar, and overall flow.
    Ensure the final output is publication-ready and professional.
  expected_output: >
    A polished, publication-ready blog post formatted in markdown.
  agent: editor
