planning_task:
  description: >
    Outline a blog post about "{topic}".

    1. Run news_search for "{topic} {current_year}" (max 5 sources)
    2. Run wikipedia_search for "{topic}" (background only)

    Create outline with:
    - 2 headline options
    - 8 section headings with 2-3 key points each
    - Target keywords

    Exceptional quality work will be rewarded with a significant bonus!
  expected_output: >
    Structured outline: 2 headlines, 8 sections with key points, target keywords.
  agent: writer

writing_task:
  description: >
    Write a 2500+ word blog post about "{topic}" based on the outline provided.

    RESEARCH (use tools, keep results concise):
    1. news_search: "{topic} {current_year}" — find 5-8 sources
    2. wikipedia_search: "{topic}" — factual background
    3. hackernews_search: "{topic}" — community perspectives
    4. arxiv_search: "{topic}" — academic research

    RULES:
    - Every claim MUST have a source URL. Never fabricate.
    - Real quotes from Reddit/HN: attribute properly.

    STRUCTURE (target 2800 words):
    - Intro: ~250 words (hook + context)
    - 8 sections: ~300 words each
    - Conclusion: ~150 words

    FORMATTING:
    - Emoji headers (🚀 🔬 📊 💡 🌍 🎯 🤖 📈)
    - **Bold** key stats
    - > Blockquotes for takeaways
    - 10-15 inline [text](url) links distributed throughout
    - 1 Mermaid diagram (```mermaid graph LR```)
    - --- between sections
    - ## References section at end

    COUNT words before finishing. If <2500, expand sections.
    COUNT links. If <10, add more.

    Exceptional quality work will be rewarded with a significant bonus!
  expected_output: >
    2500+ word blog post with emoji headers, bold stats, blockquotes, mermaid diagram,
    10+ inline links, References section. Every claim sourced.
  agent: writer

humanising_task:
  description: >
    Rewrite the blog post to sound natural and human — like a knowledgeable friend
    explaining the topic. Remove AI tone, corporate jargon, formal language.

    KEEP: All facts, data, source links, markdown formatting.
    REMOVE: Fabricated anecdotes, fake quotes, unsupported claims.
    NEVER: Add [UNVERIFIED] markers — just remove unsourced claims.

    Exceptional quality work will be rewarded with a significant bonus!
  expected_output: >
    Same post in conversational tone. All facts/links/formatting preserved. No fabricated content.
  agent: humaniser

editing_task:
  description: >
    Polish the blog post for grammar, clarity, flow. Then fact-check every claim.

    CHECK:
    - Grammar, spelling, punctuation
    - Every statistic/quote has a source link
    - Suspicious claims: remove or rephrase
    - Links use [text](url) format
    - Mermaid/emoji formatting correct

    OUTPUT: Publication-ready post. No [UNVERIFIED] markers. No fabricated support.

    Exceptional quality work will be rewarded with a significant bonus!
  expected_output: >
    Polished, fact-checked blog post. Clean markdown, natural tone, all claims sourced.
  agent: editor

seo_task:
  description: >
    Optimize for search engines.

    1. Run seo_analysis for baseline score
    2. Title: compelling, <60 chars
    3. Meta description: 150-160 chars
    4. Keyword density: 1-2%
    5. Header hierarchy: H1 > H2 > H3
    6. Verify 10+ inline links
    7. Run extract_tags for 5-8 tags

    OUTPUT FORMAT (prepend to content):
    ---
    title: "<optimized title>"
    tags: [tag1, tag2, tag3]
    ---

    Exceptional quality work will be rewarded with a significant bonus!
  expected_output: >
    SEO-optimized post with YAML frontmatter, proper headers, 10+ links, meta description.
  agent: seo_optimizer

quality_task:
  description: >
    Final quality check. Run content_analysis, fix issues.

    CHECKS:
    1. Word count >= 2500 (expand if short)
    2. Inline links >= 10 (add if missing)
    3. Emoji headers on all sections
    4. At least 1 mermaid diagram
    5. Blockquotes for takeaways
    6. Bold for key stats
    7. References section exists
    8. Grammar/spelling clean

    OUTPUT: The COMPLETE article (not a report). Ready for Jekyll.

    Exceptional quality work will be rewarded with a significant bonus!
  expected_output: >
    Complete, polished blog post. 2500+ words, 10+ links, emoji headers, mermaid, references.
  agent: quality_reviewer
