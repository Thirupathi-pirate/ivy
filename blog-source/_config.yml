theme: jekyll-theme-chirpy
lang: en
timezone: Asia/Kolkata
title: Ivy
tagline: Daily thoughts on tech, science & culture
description: >-
  Ivy explores technology, science, and culture through thoughtful
  daily articles — researched with real sources and written with care.

url: "https://blog.aaruvi.space"
baseurl: ""

avatar: "/assets/avatar.webp"

permalink: /:title/

social:
  name: Ivy
  email: thirupathikmr@gmail.com
  links:
    - https://github.com/Thirupathi-pirate

paginate: 5

comments:
  active:

assets:
  self:
    width: 800
    height: 600

toc: true

webmaster_verifications:
  google: ""
  bing: ""
  yandex: ""
  baidu: ""

analytics:
  google:
    id: ""
    pv:
      enabled: false

plugins:
  - jekyll-sitemap
  - jekyll-last-modified-at

last-modified-at:
  date-format: "%Y-%m-%d"

pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths:

kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1
