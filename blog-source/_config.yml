theme: jekyll-theme-chirpy
lang: en
timezone: Asia/Kolkata
title: Daily Blog
tagline: AI-powered daily blog on trending topics
description: >-
  A daily blog post generated by AI. Each morning a new article on
  technology, science, and culture — researched, written, and polished
  by autonomous AI agents.

url: "https://blog.aaruvi.space"
baseurl: ""

avatar: "/assets/avatar.webp"

permalink: /:title/

social:
  name: Daily Blog
  email: thirupathikmr@gmail.com
  links:
    - https://github.com/Thirupathi-pirate

paginate: 5

comments:
  active:

assets:
  self:
    width: 800
    height: 600

toc: true

pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths:

kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1
