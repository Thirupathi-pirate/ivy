<!-- Google Fonts — non-blocking (Chirpy doesn't load these) -->
<link rel="preload" as="style" crossorigin
  href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700;800&display=swap">
<link rel="preload" as="style" crossorigin
  href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&display=swap">

<link rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700;800&display=swap"
  media="print" onload="this.media='all'">
<link rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&display=swap"
  media="print" onload="this.media='all'">

<noscript>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&display=swap">
</noscript>

<!-- Theme Color (mobile browser) -->
<meta name="theme-color" content="#12121E">

<!-- Referrer policy -->
<meta name="referrer" content="strict-origin-when-cross-origin">

<!-- Canonical URL -->
<link rel="canonical" href="{{ page.url | absolute_url }}">

<!-- Meta keywords -->
<meta name="keywords" content="technology, science, culture, tech blog, future, AI, {{ page.tags | join: ', ' | default: '' }}">

<!-- Google Search Console -->
<meta name="google-site-verification" content="DVlakunl_jZgYbXcHvX3KfmocgyIiaIg81" />

<script>
/* Mermaid dark theme — matches Midnight Purple */
window.mermaid = {
  startOnLoad: true,
  theme: 'base',
  themeVariables: {
    background: '#1A1A2E',
    primaryColor: '#BB86FC',
    primaryTextColor: '#FFFFFF',
    primaryBorderColor: '#BB86FC',
    lineColor: '#BB86FC',
    secondaryColor: '#2A2A3E',
    tertiaryColor: '#12121E',
    edgeLabelBackground: '#1A1A2E',
    fontFamily: '"Google Sans", sans-serif',
    fontSize: '14px'
  }
};
</script>

<!-- Primary meta -->
<meta name="description" content="{{ page.description | default: page.excerpt | strip_html | normalize_whitespace | truncate: 160 | default: site.description }}">
<meta name="author" content="{{ site.social.name }}">

<!-- Open Graph -->
<meta property="og:title" content="{{ page.title | default: site.title }}">
<meta property="og:description" content="{{ page.description | default: page.excerpt | strip_html | normalize_whitespace | truncate: 200 | default: site.description }}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:site_name" content="{{ site.title }}">
<meta property="og:locale" content="{{ site.lang | default: 'en' }}">
<meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ page.title | default: site.title }}">
<meta name="twitter:description" content="{{ page.description | default: page.excerpt | strip_html | normalize_whitespace | truncate: 200 | default: site.description }}">

{% if page.image %}
  <meta property="og:image" content="{{ page.image.path }}">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:image" content="{{ page.image.path }}">
{% else %}
  <meta property="og:image" content="{{ site.url }}/assets/avatar.webp">
  <meta property="og:image:width" content="192">
  <meta property="og:image:height" content="192">
  <meta name="twitter:image" content="{{ site.url }}/assets/avatar.webp">
{% endif %}

{% if page.layout == 'post' %}
  <meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}">
  {% if page.last_modified_at %}
    <meta property="article:modified_time" content="{{ page.last_modified_at | date_to_xmlschema }}">
  {% endif %}
  <meta property="article:author" content="{{ site.url }}">
  {% if page.tags.size > 0 %}
    {% for tag in page.tags %}
    <meta property="article:tag" content="{{ tag }}">
    {% endfor %}
  {% endif %}
  {% if page.categories.size > 0 %}
    <meta property="article:section" content="{{ page.categories | first }}">
  {% endif %}
{% endif %}

<!-- Breadcrumb Schema -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": "{{ site.url }}/"
    }
    {% if page.layout == 'post' %}
      {% if page.categories.size > 0 %}
        {% assign pos = 2 %}
        {% for cat in page.categories %},
        {
          "@type": "ListItem",
          "position": {{ pos }},
          "name": "{{ cat }}",
          "item": "{{ site.url }}/categories/{{ cat | slugify }}/"
        }
        {% assign pos = pos | plus: 1 %}
        {% endfor %},
        {
          "@type": "ListItem",
          "position": {{ page.categories.size | plus: 2 }},
          "name": {{ page.title | jsonify }},
          "item": "{{ page.url | absolute_url }}"
        }
      {% else %},
        {
          "@type": "ListItem",
          "position": 2,
          "name": {{ page.title | jsonify }},
          "item": "{{ page.url | absolute_url }}"
        }
      {% endif %}
    {% endif %}
  ]
}
</script>

<!-- WebSite Schema (Google Knowledge Panel) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "{{ site.title }}",
  "url": "{{ site.url }}",
  "description": "{{ site.description }}",
  "potentialAction": {
    "@type": "SearchAction",
    "target": "{{ site.url }}/?q={search_term_string}",
    "query-input": "required name=search_term_string"
  }
}
</script>

{% if page.layout == 'post' %}
<!-- BlogPosting Schema -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": {{ page.title | jsonify }},
  "description": {{ page.description | default: page.excerpt | strip_html | normalize_whitespace | truncate: 160 | jsonify }},
  "datePublished": "{{ page.date | date_to_xmlschema }}"{% if page.last_modified_at %},
  "dateModified": "{{ page.last_modified_at | date_to_xmlschema }}"{% endif %},
  "author": {
    "@type": "Person",
    "name": {{ site.social.name | jsonify }},
    "url": "{{ site.url }}"
  },
  "publisher": {
    "@type": "Organization",
    "name": {{ site.title | jsonify }},
    "logo": {
      "@type": "ImageObject",
      "url": "{{ site.url }}/assets/avatar.webp"
    }
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ page.url | absolute_url }}"
  }{% if page.image %},
  "image": {
    "@type": "ImageObject",
    "url": "{{ page.image.path }}"
  }{% endif %}{% if page.tags.size > 0 %},
  "keywords": {{ page.tags | join: ', ' | jsonify }}{% endif %}
}
</script>
{% endif %}
