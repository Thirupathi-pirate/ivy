name: Daily Blog Writer

on:
  schedule:
    - cron: '30 5 * * *'
  workflow_dispatch:
    inputs:
      topic:
        description: 'Blog topic'
        required: false
        default: 'The Future of AI Agents'

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.11'
  RUBY_VERSION: '3.3'

jobs:
  run-crew:
    runs-on: ubuntu-latest
    outputs:
      post_url: ${{ steps.publish.outputs.post_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install Python deps
        run: uv sync

      - name: Run blog writing crew
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          TOPIC: ${{ inputs.topic || 'The Future of AI Agents' }}
        run: uv run crewai run

      - name: Publish post to Jekyll source
        id: publish
        env:
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: |
          uv run python scripts/publish_post.py "${{ inputs.topic || 'The Future of AI Agents' }}"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
          working-directory: blog-source

      - name: Build Jekyll site
        run: |
          JEKYLL_ENV=production bundle exec jekyll build
        working-directory: blog-source

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: blog-source/_site
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          cname: blog.aaruvi.space

      - name: Build post URL
        id: url
        run: |
          SLUG=$(echo "${{ inputs.topic || 'The Future of AI Agents' }}" | tr '[:upper:]' '[:lower:]' | sed 's/ /-/g' | sed 's/[^a-z0-9-]//g')
          echo "url=https://blog.aaruvi.space/$SLUG/" >> $GITHUB_OUTPUT

      - name: Meta (date + thought)
        id: meta
        run: |
          echo "date=$(date +'%d-%m-%Y')" >> $GITHUB_OUTPUT
          QUOTE_JSON=$(curl -s https://dummyjson.com/quotes/random)
          CONTENT=$(echo "$QUOTE_JSON" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['quote'])")
          AUTHOR=$(echo "$QUOTE_JSON" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['author'])")
          echo "thought<<EOF" >> $GITHUB_OUTPUT
          echo "\"$CONTENT\" ✨" >> $GITHUB_OUTPUT
          echo "   — $AUTHOR" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send to Telegram
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ✍️ Morning Blog — ${{ steps.meta.outputs.date }}

            ${{ inputs.topic || 'The Future of AI Agents' }}

            Read: ${{ steps.url.outputs.url }}

            ✨ ${{ steps.meta.outputs.thought }}
