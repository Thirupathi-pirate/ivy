name: OpenCode Auto-Fix

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Task for OpenCode'
        required: true

jobs:
  autofix:
    if: |
      (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'bug') ||
      (github.event_name == 'issue_comment' && (
        contains(github.event.comment.body, ' /oc') ||
        startsWith(github.event.comment.body, '/oc') ||
        contains(github.event.comment.body, ' /opencode') ||
        startsWith(github.event.comment.body, '/opencode')
      )) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Run OpenCode
        uses: sst/opencode/github@latest
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        with:
          model: huggingface/zai-org/GLM-4.5-Air

      - name: Tag PR for auto-verification
        run: |
          sleep 10
          PR=$(gh pr list \
            --state open \
            --author "github-actions[bot]" \
            --json number,createdAt,headRepository \
            --jq '[.[] | select(.headRepository.name == "${{ github.event.repository.name }}")] | max_by(.createdAt).number')
          if [ -n "$PR" ] && [ "$PR" != "null" ]; then
            gh pr edit "$PR" --add-label "autofix"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
